name: musicplayer
description: Personal music streaming client (Android / iOS / macOS / Web).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  just_audio: ^0.9.42
  audio_service: ^0.18.15
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1
  web_socket_channel: ^3.0.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
