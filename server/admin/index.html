<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Library Admin</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #14151a; color: #e6e6e6; }
    header { padding: 16px 24px; background: #1d1f27; border-bottom: 1px solid #2a2d38; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 18px; margin: 0; }
    main { max-width: 820px; margin: 0 auto; padding: 24px; }
    .card { background: #1d1f27; border: 1px solid #2a2d38; border-radius: 10px; padding: 18px; margin-bottom: 18px; }
    .card h2 { font-size: 15px; margin: 0 0 12px; color: #9aa4b2; text-transform: uppercase; letter-spacing: .04em; }
    input, button { font: inherit; }
    input[type=text], input[type=password] { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #333747; background: #12131a; color: #e6e6e6; }
    button { padding: 9px 16px; border-radius: 8px; border: none; background: #4f7cff; color: #fff; cursor: pointer; }
    button.secondary { background: #333747; }
    button:disabled { opacity: .5; cursor: default; }
    .row { display: flex; gap: 8px; align-items: center; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #24262f; gap: 8px; }
    .muted { color: #8a91a0; font-size: 13px; }
    .stats { display: flex; gap: 24px; }
    .stat b { display: block; font-size: 24px; }
    .progress { height: 8px; background: #24262f; border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .progress > div { height: 100%; background: #4f7cff; width: 0; transition: width .2s; }
    .hidden { display: none; }
    a { color: #7ea0ff; }
  </style>
</head>
<body>
  <header>
    <h1>🎵 Music Library Admin</h1>
    <button id="logoutBtn" class="secondary hidden">Logout</button>
  </header>
  <main>
    <!-- Login -->
    <div id="loginCard" class="card">
      <h2>Login</h2>
      <form id="loginForm" class="row" style="flex-direction: column; align-items: stretch; gap: 10px;">
        <input id="username" name="username" type="text" placeholder="Username" autocomplete="username" />
        <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password" />
        <button id="loginBtn" type="submit">Login</button>
        <div id="loginError" class="muted"></div>
      </form>
    </div>

    <!-- App -->
    <div id="app" class="hidden">
      <div class="card">
        <h2>Library</h2>
        <div class="stats">
          <div class="stat"><b id="statAlbums">–</b><span class="muted">Albums</span></div>
          <div class="stat"><b id="statTracks">–</b><span class="muted">Tracks</span></div>
          <div class="stat"><b id="statPlaylists">–</b><span class="muted">Playlists</span></div>
        </div>
      </div>

      <div class="card">
        <h2>Folders</h2>
        <ul id="folderList"></ul>
        <div class="row" style="margin-top: 12px;">
          <input id="folderPath" type="text" placeholder="/absolute/path/to/music" />
          <button id="addFolderBtn">Add</button>
        </div>
        <div class="row" id="addExtensions" style="margin-top: 8px; flex-wrap: wrap;">
          <span class="muted">Extensions:</span>
        </div>
        <div class="muted" style="margin-top: 4px; font-size: 12px;">
          None checked = include all supported types.
        </div>
        <div id="browser" class="muted" style="margin-top: 10px;"></div>
      </div>

      <div class="card">
        <h2>Scan</h2>
        <div class="row">
          <button id="scanBtn">Scan all folders</button>
          <span id="scanState" class="muted"></span>
        </div>
        <div class="progress"><div id="scanBar"></div></div>
        <div id="scanDetail" class="muted" style="margin-top: 8px;"></div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
